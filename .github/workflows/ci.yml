name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  format-check:
    name: Format – Google C++ Style (clang-format)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang-format

      - name: Check formatting (Google C++ Style Guide)
        # Uses .clang-format at the repo root (BasedOnStyle: Google).
        # --dry-run --Werror exits non-zero if any file would be reformatted.
        run: |
          find Plugin/Source Host/Source tests \
            \( -name '*.cpp' -o -name '*.h' \) \
            | xargs clang-format --dry-run --Werror --style=file

  build-and-test:
    name: Linux – Ninja – Debug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            cmake \
            gcc-14 \
            g++-14 \
            libasound2-dev \
            libx11-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libfreetype6-dev \
            libfontconfig1-dev \
            libpng-dev

      - name: Fix freetype include path
        run: |
          sudo ln -sf /usr/include/freetype2/ft2build.h /usr/include/ft2build.h
          sudo ln -sf /usr/include/freetype2/freetype   /usr/include/freetype

      - name: Configure (Debug)
        run: cmake --preset linux
        env:
          CC: gcc-14
          CXX: g++-14

      - name: Build (Debug)
        run: cmake --build --preset linux

      - name: Run tests
        run: ctest --preset linux --output-on-failure
