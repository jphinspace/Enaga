  <rect x="0" y="0" width="200" height="200" rx="48" fill="#FFFFFF"/>
  <!-- Eyes -->
  <circle cx="74" cy="100" r="10" fill="#1A1A1A"/>
  <circle cx="78" cy="96" r="3" fill="#FFFFFF"/>
  <circle cx="126" cy="100" r="10" fill="#1A1A1A"/>
  <circle cx="130" cy="96" r="3" fill="#FFFFFF"/>
