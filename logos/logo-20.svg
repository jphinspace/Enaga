  <circle cx="160" cy="30" r="3.5" fill="#C8DCF0" opacity="0.7"/>
  <circle cx="178" cy="60" r="2" fill="#C8DCF0" opacity="0.5"/>
  <circle cx="22" cy="140" r="2.5" fill="#C8DCF0" opacity="0.6"/>
