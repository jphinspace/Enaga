<!-- Logo 09: Monochrome stamp style, circular badge -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="#F5F5F0" stroke="#111" stroke-width="4"/>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#111" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Bird head -->
  <circle cx="100" cy="104" r="56" fill="#FFFFFF" stroke="#111" stroke-width="3"/>
  <!-- Cap -->
  <path d="M50 92 Q68 40 100 36 Q132 40 150 92 Q124 68 100 66 Q76 68 50 92Z" fill="#111111"/>
  <!-- Eyes -->
  <circle cx="80" cy="104" r="8" fill="#111111"/>
  <circle cx="83" cy="101" r="2" fill="#FFFFFF"/>
  <circle cx="120" cy="104" r="8" fill="#111111"/>
  <circle cx="123" cy="101" r="2" fill="#FFFFFF"/>
  <!-- Beak -->
  <path d="M97 118 L100 126 L103 118Z" fill="#111111"/>
  <!-- Ring text -->
  <path id="topArc" d="M 20 100 A 80 80 0 0 1 180 100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#111" letter-spacing="3.5">
    <textPath href="#topArc" startOffset="12%">ENAGA · WHITE NOISE ·</textPath>
  </text>
</svg>
