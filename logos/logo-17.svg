<!-- Logo 17: Sleeping/peaceful bird – closed eyes (great for white noise app) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Head -->
  <circle cx="100" cy="110" r="72" fill="#FEFEFE" stroke="#222" stroke-width="3"/>
  <!-- Cap -->
  <path d="M36 98 Q58 30 100 26 Q142 30 164 98 Q132 66 100 64 Q68 66 36 98Z" fill="#222222"/>
  <!-- Cheeks (rosy) -->
  <ellipse cx="66" cy="120" rx="15" ry="10" fill="#FFBBC8" opacity="0.55"/>
  <ellipse cx="134" cy="120" rx="15" ry="10" fill="#FFBBC8" opacity="0.55"/>
  <!-- Closed eyes (crescent/arc – peaceful) -->
  <path d="M67 110 Q76 102 85 110" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M115 110 Q124 102 133 110" fill="none" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Beak -->
  <path d="M97 126 L100 135 L103 126Z" fill="#222222"/>
  <!-- Z z z (sleep) -->
  <text x="142" y="78" font-family="Georgia,serif" font-size="14" fill="#AAAAAA" font-style="italic">zzz</text>
</svg>
